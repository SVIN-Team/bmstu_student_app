services:
  postgres:
    image: postgres:16
    container_name: queue_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${STUDHUB_POSTGRES_DB}
      POSTGRES_USER: ${STUDHUB_POSTGRES_USER}
      POSTGRES_PASSWORD: ${STUDHUB_POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql:/docker-entrypoint-initdb.d:ro

volumes:
  postgres_data: